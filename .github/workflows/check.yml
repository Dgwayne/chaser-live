name: check-live

on:
  schedule:
    # Best-effort every 5 minutes (GitHub may delay scheduled runs under load).
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: check-live
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check chaser live status
        run: python check_live.py
      - name: Commit live.json if changed
        run: |
          git config user.name "chaser-live-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add live.json
          if git diff --staged --quiet; then
            echo "No change in live status."
          else
            git commit -m "update live status [skip ci]"
            git push
          fi
